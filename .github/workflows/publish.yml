name: Publish to GitHub Packages

# Auto-publishes the mod jar to GitHub Packages and cuts a matching GitHub
# Release. Restricted to pushes on master so feature/* and develop pushes
# don't accidentally bump the published version. Manual dispatch is also
# allowed for re-runs.
#
# The release tag is "v${project.mod_version}" read from gradle.properties.
# Bump mod_version in gradle.properties before merging to master, otherwise
# softprops/action-gh-release will fail trying to overwrite an existing tag.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Single-flight: a second push doesn't interrupt the first; queued one
# replaces the third. Keeps GitHub Packages from receiving two concurrent
# uploads of the same version.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # creating the GitHub Release + tag
      packages: write  # uploading to GitHub Packages Maven

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # setup-gradle reads gradle/wrapper/gradle-wrapper.properties and
      # provisions the matching Gradle (9.2.1) — no checked-in gradlew
      # script needed. Also caches the dependency cache between runs.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read project version
        id: ver
        run: |
          version=$(grep '^mod_version' gradle.properties | cut -d= -f2 | xargs)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building version $version"

      - name: Build mod jar
        run: gradle build -PpublishMode=true --no-daemon --stacktrace

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle publish -PpublishMode=true --no-daemon --stacktrace

      # action-gh-release creates-or-updates: if the tag already exists it
      # updates the release in place. fail_on_unmatched_files=true so a
      # busted build/ layout breaks the workflow instead of producing an
      # empty release.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, 'alpha') || contains(steps.ver.outputs.version, 'beta') || contains(steps.ver.outputs.version, 'rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
